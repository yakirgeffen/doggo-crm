<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background: warm off-white matching the app theme -->
  <rect width="1200" height="630" fill="#F8F5F0"/>

  <!-- Left accent bar (Moss Green primary) -->
  <rect x="0" y="0" width="8" height="630" fill="#4A6741"/>

  <!-- Top gradient overlay (primary/10 from app theme) -->
  <defs>
    <linearGradient id="heroGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4A6741" stop-opacity="0.08"/>
      <stop offset="50%" stop-color="#F8F5F0" stop-opacity="0"/>
      <stop offset="100%" stop-color="#C4785C" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="badgeGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4A6741" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#4A6741" stop-opacity="0.08"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#heroGradient)"/>

  <!-- Founding cohort badge (top right area) -->
  <rect x="860" y="48" width="288" height="40" rx="20" fill="url(#badgeGradient)" stroke="#4A6741" stroke-width="1.5" stroke-opacity="0.3"/>
  <text x="1004" y="74" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#4A6741" text-anchor="middle" letter-spacing="0.5">קבוצת הלקוחות המייסדים</text>

  <!-- Paw emoji / logo area -->
  <text x="80" y="180" font-size="64" font-family="Apple Color Emoji, Segoe UI Emoji, sans-serif">🐾</text>

  <!-- Brand name -->
  <text x="80" y="240" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="28" font-weight="700" fill="#2D3A2D" letter-spacing="-0.5">Doggo CRM</text>

  <!-- Main headline (Hebrew, right-aligned since the design is bilingual) -->
  <!-- Hebrew headline: "ניהול עסק האילוף שלך." -->
  <text x="1120" y="310" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="68" font-weight="900" fill="#2D3A2D" text-anchor="end" letter-spacing="-2">ניהול עסק האילוף שלך.</text>

  <!-- Subheadline line 1 -->
  <text x="1120" y="382" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="68" font-weight="900" fill="#4A6741" text-anchor="end" letter-spacing="-2">בלי גיליונות אקסל.</text>

  <!-- Description line -->
  <text x="1120" y="440" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="400" fill="#6B7B6B" text-anchor="end">לקוחות · תוכניות אילוף · חשבוניות · יומן Google</text>

  <!-- Pricing callout box -->
  <rect x="80" y="460" width="320" height="112" rx="16" fill="#4A6741"/>
  <!-- Price -->
  <text x="240" y="510" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="48" font-weight="900" fill="#FFFFFF" text-anchor="middle">₪149</text>
  <!-- Price subtext -->
  <text x="240" y="540" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="400" fill="rgba(255,255,255,0.85)" text-anchor="middle">לחודש · ניסיון 30 יום חינם</text>
  <!-- Badge on price box -->
  <rect x="100" y="558" width="240" height="26" rx="13" fill="rgba(255,255,255,0.15)"/>
  <text x="220" y="576" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#FFFFFF" text-anchor="middle">ללא כרטיס אשראי</text>

  <!-- Feature pills (bottom right area) -->
  <rect x="700" y="470" width="180" height="36" rx="18" fill="#4A6741" fill-opacity="0.1" stroke="#4A6741" stroke-width="1" stroke-opacity="0.2"/>
  <text x="790" y="494" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#4A6741" text-anchor="middle">Google Calendar</text>

  <rect x="896" y="470" width="140" height="36" rx="18" fill="#4A6741" fill-opacity="0.1" stroke="#4A6741" stroke-width="1" stroke-opacity="0.2"/>
  <text x="966" y="494" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#4A6741" text-anchor="middle">WhatsApp</text>

  <rect x="1052" y="470" width="128" height="36" rx="18" fill="#4A6741" fill-opacity="0.1" stroke="#4A6741" stroke-width="1" stroke-opacity="0.2"/>
  <text x="1116" y="494" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#4A6741" text-anchor="middle">חשבוניות</text>

  <rect x="700" y="516" width="120" height="36" rx="18" fill="#C4785C" fill-opacity="0.1" stroke="#C4785C" stroke-width="1" stroke-opacity="0.2"/>
  <text x="760" y="540" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#C4785C" text-anchor="middle">בנוי בעברית</text>

  <rect x="834" y="516" width="158" height="36" rx="18" fill="#C4785C" fill-opacity="0.1" stroke="#C4785C" stroke-width="1" stroke-opacity="0.2"/>
  <text x="913" y="540" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#C4785C" text-anchor="middle">נבנה למאלפי כלבים</text>

  <!-- Bottom domain bar -->
  <rect x="0" y="590" width="1200" height="40" fill="#4A6741" fill-opacity="0.06"/>
  <text x="80" y="616" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="500" fill="#4A6741">doggocrm.app</text>
</svg>
